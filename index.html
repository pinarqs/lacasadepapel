<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Casa De Papel</title>
    <link rel="stylesheet" href="style.css">
</head>
<!-- Arka Plan Müzik -->
<audio id="bgMusic" autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<!-- Bomba Sayaç -->
<div id="bomb">
    <h2>SOYGUN BAŞLIYOR</h2>
    <div id="countdown">10</div>
</div>

<!-- Para Konteyner -->
<div id="money-container"></div>

<!-- Sis Katmanı -->
<div class="smoke"></div>
<body>

    <h1 class="title">LA CASA DE PAPEL</h1>

    <div class="card-container">

        <div class="card fade-in">
            <img src="images/profesor.jpg" alt="Profesör">
            <div class="card-content">
                <h2>Profesör</h2>
                <p>Planın Mimarı</p>
            </div>
        </div>

        <div class="card fade-in">
            <img src="images/tokyo.jpg" alt="Tokyo">
            <div class="card-content">
                <h2>Tokyo</h2>
                <p>Anlatıcı & Asi Ruh</p>
            </div>
        </div>

        <div class="card fade-in">
            <img src="images/berlin.jpg" alt="Berlin">
            <div class="card-content">
                <h2>Berlin</h2>
                <p>Karizma & Kaos</p>
            </div>
        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
